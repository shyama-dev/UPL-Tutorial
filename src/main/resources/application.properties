spring.application.name=tutorial

spring.datasource.url=jdbc:mysql://localhost:3306/tutorial_db
spring.datasource.username=root
spring.datasource.password=user

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 15 minutes in milliseconds = 15 * 60 * 1000 = 900000
# For dev/testing, you can use 24 hours = 86400000
jwt.expiration=86400000
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

logging.level.root=INFO

logging.level.com.upl.tutorial=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

logging.file.name=logs/app.log

logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

